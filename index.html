<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wildlife Gallery | Africa</title>

<!-- Internal CSS -->
<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

/* Navigation */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:bold;
}

/* Hero Section */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:45px;
    margin-bottom:10px;
}

.hero p{
    font-size:18px;
}

/* Gallery Grid */
.gallery{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

/* Image Containers */
.card{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
    transition: all 0.4s ease;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    padding:15px;
    text-align:center;
}

/* Footer */
footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.4);
}

</style>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>
    <div style="font-size:22px; font-weight:bold;">Wildlife Africa</div> <!-- Inline CSS -->
    <div>
        <a href="#">Home</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1 style="color:#00ffcc;">Explore African Wildlife</h1> <!-- Inline CSS -->
    <p>Experience the beauty of nature through our professional wildlife collection.</p>
</section>

<section class="gallery">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d" alt="Lion">
        <h3>Lion</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1508672019048-805c876b67e2" alt="Elephant">
        <h3>Elephant</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1552410260-0fd9b577afa6" alt="Giraffe">
        <h3>Giraffe</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1549366021-9f761d040a94" alt="Zebra">
        <h3>Zebra</h3>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1516426122078-c23e76319801" alt="Cheetah">
        <h3>Cheetah</h3>
    </div>

</section>

<footer>
    © 2026 Wildlife Gallery | Designed by Ibrahim
</footer>
